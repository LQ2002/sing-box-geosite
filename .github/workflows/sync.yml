name: Config Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: "Setup sing-box"
      run: |
          set -Eeuo pipefail
          # 从 GitHub Releases API 获取最新 release 中的 linux_amd64 .deb 下载链接
          SING_BOX_DEB_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep "browser_download_url" | grep "linux_amd64.deb" | head -n1 | cut -d '"' -f4 || true)
          if [ -z "$SING_BOX_DEB_URL" ]; then
            echo "Failed to find sing-box linux_amd64 .deb URL from latest release"
            exit 1
          fi
          echo "Downloading $SING_BOX_DEB_URL"
          wget -O sing-box.deb "$SING_BOX_DEB_URL"
          sudo dpkg -i sing-box.deb
    - name: Set up Python3
      uses: actions/setup-python@v2
      with:
        python-version: 3.x
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests pyyaml

    - name: Prepare directories
      run: |
        mkdir -p ./rule/

    - name: Run script
      run: python ../main.py
      working-directory: ./rule/
    - name: Commit and push config.json
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add ./rule/*.json
        git add ./rule/*.srs

        # 检查是否有文件被修改
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        else
          git commit -m "ci: 使用 sing-box 最新正式版下载链接，避免固定版本号"
          git push
        fi
